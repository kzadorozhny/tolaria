<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tolaria Phase 0 Spike WebView</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #fafafa;
        color: #1f2328;
        font: 15px/1.5 -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        padding: 24px;
      }
      h1 { font-size: 18px; margin: 0 0 16px; }
      .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
      label { width: 110px; font-size: 13px; color: #57606a; }
      textarea, input[type="text"] {
        flex: 1;
        font: inherit;
        padding: 8px 10px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #ffffff;
        color: inherit;
      }
      textarea { min-height: 120px; resize: vertical; }
      button {
        font: inherit;
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #1f6feb;
        background: #1f6feb;
        color: #ffffff;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }
      pre {
        font: 12px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 8px 10px;
        white-space: pre-wrap;
        max-height: 140px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Phase 0 Spike WebView</h1>

    <div class="row">
      <label for="ta">Textarea</label>
      <textarea id="ta" rows="6" cols="60" autofocus placeholder="type here — exercises focus + IME composition logging"></textarea>
    </div>

    <div class="row">
      <label for="single-line">Single line</label>
      <input id="single-line" type="text" placeholder="single-line input" />
    </div>

    <div class="row">
      <label></label>
      <button id="btn">Click me</button>
    </div>

    <div class="row">
      <label>Last IPC</label>
      <pre id="log">(no IPC sent yet)</pre>
    </div>

    <script>
      // The bridge — every event the Rust side cares about flows through
      // window.tolariaPoc.log(kind, value) and out via wry's IPC channel.
      const post = (k, v) => {
        const payload = JSON.stringify({ k, v });
        try {
          window.ipc?.postMessage?.(payload);
        } catch (err) {
          console.warn("ipc.postMessage failed", err);
        }
        const log = document.getElementById("log");
        if (log) {
          const line = payload + "\n" + (log.textContent ?? "");
          log.textContent = line.length > 2000 ? line.slice(0, 2000) : line;
        }
      };

      window.tolariaPoc = { log: post };

      const ta = document.getElementById("ta");
      const singleLine = document.getElementById("single-line");

      const attachFocusTracking = (el, targetName) => {
        el?.addEventListener("focus", () => post("focus", targetName));
        el?.addEventListener("blur", () => post("blur", targetName));
      };
      attachFocusTracking(ta, "textarea");
      attachFocusTracking(singleLine, "single-line");

      // IME composition events. `value` carries the current textarea contents
      // so the Rust side can confirm the buffer matches expectations on
      // commit. Phase strings match the DOM event names so they read clean
      // in the stdout stream.
      const attachComposition = (el, _targetName) => {
        const emit = (phase) => (event) => {
          post("composition", {
            phase,
            data: event.data ?? "",
            value: el?.value ?? "",
          });
        };
        el?.addEventListener("compositionstart", emit("compositionstart"));
        el?.addEventListener("compositionupdate", emit("compositionupdate"));
        el?.addEventListener("compositionend", emit("compositionend"));
      };
      attachComposition(ta, "textarea");
      attachComposition(singleLine, "single-line");

      // Non-printing keys (and any chord with a modifier) are forwarded so
      // we can distinguish "menu intercepted Cmd+S" from "webview swallowed
      // Cmd+S". Plain printable characters are filtered out to keep stdout
      // legible during normal typing.
      const isPrintable = (e) =>
        e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey;
      const forwardKey = (e) => {
        if (isPrintable(e)) return;
        const mods = [
          e.metaKey ? "cmd" : null,
          e.ctrlKey ? "ctrl" : null,
          e.altKey ? "alt" : null,
          e.shiftKey ? "shift" : null,
        ]
          .filter(Boolean)
          .join("+");
        post("keydown", { key: e.key, mods });
      };
      ta?.addEventListener("keydown", forwardKey);
      singleLine?.addEventListener("keydown", forwardKey);

      document.getElementById("btn")?.addEventListener("click", () => {
        post("button_click", Date.now());
      });
    </script>
  </body>
</html>
